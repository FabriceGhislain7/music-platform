# Nginx come reverse proxy davanti a Gunicorn.
# Gestisce file statici/media direttamente (più veloce di Django),
# e passa le richieste API a Gunicorn su porta 8000.

upstream django_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # File statici (CSS, JS, admin) — serviti direttamente da Nginx
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # File media (avatar, upload utenti) — serviti direttamente da Nginx
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # Tutto il resto → Gunicorn
    location / {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
