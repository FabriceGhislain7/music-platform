services:
  # ── Backend Django ──────────────────────────────────────────────────────────
  - type: web
    name: music-platform-backend
    env: python
    region: frankfurt
    rootDir: backend
    buildCommand: >
      pip install -r requirements/production.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --workers 2 --timeout 120
    plan: free
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: music-platform-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: music-platform-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://music-platform-frontend.onrender.com

  # ── Frontend React/Vite ─────────────────────────────────────────────────────
  - type: web
    name: music-platform-frontend
    env: static
    region: frankfurt
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://music-platform-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
databases:
  - name: music-platform-db
    databaseName: music_platform
    user: music_platform
    region: frankfurt
    plan: free
